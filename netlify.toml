# ═══════════════════════════════════════════════════
# ORION RADAR PRO — netlify.toml
# Proxy /api/* → backend Render
# ═══════════════════════════════════════════════════

[build]
  publish = "."

# ── PROXY: Frontend → Backend Render ──────────────
# Troca a URL abaixo pela URL real do seu app no Render
# Exemplo: https://orion-radar-backend.onrender.com

[[redirects]]
  from   = "/api/*"
  to     = "https://orion-radar-backend.onrender.com/:splat"
  status = 200
  force  = true

  [redirects.headers]
    X-Orion-Source = "netlify-proxy"

# ── SPA FALLBACK (404 → index.html) ───────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
