        assets: ["EURUSD", "GBPUSD", "USDJPY", "XAUUSD", "US100", "BTCUSD"], entryTypes: ["Confirmed", "Continuation"], riskModes: ["Conservative", "Moderate"],
        signalsPerDay: "Medium signal frequency", delay: "Faster delivery",
        features: ["Expanded asset access", "Confirmed and continuation setups", "Chart preview with markers", "Extended signal history"],
        locked: ["Premium early entries", "Maximum priority", "Full reports"]
      },

        assets: ["EURUSD", "GBPUSD", "USDJPY", "XAUUSD", "US100", "BTCUSD", "ETHUSD", "NAS100", "US500"], entryTypes: ["Confirmed", "Continuation", "Early Entry"], riskModes: ["Conservative", "Moderate", "Aggressive"],
        signalsPerDay: "High signal frequency", delay: "Priority delivery",
        features: ["Broader market coverage", "Higher-risk early-entry setups", "Detailed confluence context", "Performance reporting"],
        locked: ["Elite signal queue", "Premium dashboard modules"]

        assets: ["EURUSD", "GBPUSD", "USDJPY", "XAUUSD", "BTCUSD", "ETHUSD", "US100", "US500"], entryTypes: ["Confirmed", "Continuation", "Early Entry", "Premium Setup"], riskModes: ["Conservative", "Moderate", "Aggressive"],
        signalsPerDay: "Maximum priority", delay: "Top-tier routing",
        features: ["Premium market coverage", "All entry types unlocked", "Priority access to top signals", "Full dashboard preview and analytics"],

    const fallbackLiveRows = [
      { symbol: "EURUSD", tf: "M5", side: "BUY", score: 92, setup: "CHOCH + BOS + FVG", status: "Confirmed", entry: "1.08420", sl: "1.08280", tp: "1.08750", ts: "2026-03-20 12:00:00 UTC" },
      { symbol: "XAUUSD", tf: "M15", side: "SELL", score: 88, setup: "OB + FVG + trend alignment", status: "Continuation", entry: "2045.80", sl: "2051.20", tp: "2036.40", ts: "2026-03-20 12:05:00 UTC" },
      { symbol: "BTCUSD", tf: "M5", side: "BUY", score: 95, setup: "BOS + premium structure", status: "High Priority", entry: "68420", sl: "67880", tp: "69240", ts: "2026-03-20 12:10:00 UTC" }
    ];

    const signalByPlan = {
      Bronze: { entry: "1.08420", sl: "1.08280", tp: "1.08750", direction: "BUY", confluence: "BOS + M5 confirmation", notes: "A simpler setup with less context and limited asset access.", timeframe: "M5", confidence: "76 / 100", quality: "Base filtered signal" },
      Silver: { entry: "3368.40", sl: "3359.80", tp: "3381.20", direction: "BUY", confluence: "CHOCH + BOS + FVG", notes: "More confluence and a stronger continuation framework.", timeframe: "M15", confidence: "84 / 100", quality: "Multi-factor confirmation" },
      Gold: { entry: "2045.80", sl: "2051.20", tp: "2036.40", direction: "SELL", confluence: "OB + FVG + CHOCH + H1 trend alignment", notes: "Includes advanced structure reading and controlled early-entry logic.", timeframe: "M30", confidence: "91 / 100", quality: "Advanced confluence" },
      Platinum: { entry: "68420", sl: "67880", tp: "69240", direction: "BUY", confluence: "BOS + OB + FVG + M15/M30/H1 structure", notes: "Premium preview with deeper context and top-signal priority.", timeframe: "M5", confidence: "95 / 100", quality: "Priority signal routing" }
    };

    const watchRows = [
      { symbol: "EURUSD", bid: "1.08421", ask: "1.08429", spread: "0.8" },
      { symbol: "GBPUSD", bid: "1.27384", ask: "1.27392", spread: "0.8" },
      { symbol: "USDJPY", bid: "149.842", ask: "149.851", spread: "0.9" },
      { symbol: "XAUUSD", bid: "2045.80", ask: "2046.15", spread: "3.5" },
      { symbol: "BTCUSD", bid: "68420", ask: "68442", spread: "22" }
    ];

    function parseRemoteSource() {
      const url = new URL(window.location.href);
      return url.searchParams.get('signals') || localStorage.getItem('orion_signals_source') || './orion_signals.json';
    }

    function normalizeRows(data) {
      const rows = Array.isArray(data) ? data : (Array.isArray(data?.signals) ? data.signals : []);
      return rows.slice(0, 20).map((row, idx) => ({
        symbol: row.symbol || row.asset || `ASSET${idx + 1}`,
        tf: row.tf || row.timeframe || 'M5',
        side: String(row.side || row.direction || 'BUY').toUpperCase(),
        score: Number(row.score || row.final_score || 80),
        setup: row.setup || row.confluence || row.pattern || 'Signal detected',
        status: row.status || 'Live',
        entry: String(row.entry || row.price || '-'),
        sl: String(row.sl || row.stop || '-'),
        tp: String(row.tp || row.tp1 || row.target || '-'),
        ts: row.ts || row.time || row.timestamp || new Date().toISOString()
      }));
    }

    function buildSyntheticCandles(signal) {
      const entry = Number(signal.entry || 100);
      const stop = Number(signal.sl || entry * 0.99);
      const target = Number(signal.tp || entry * 1.01);
      const buy = String(signal.direction || signal.side || 'BUY').toUpperCase() === 'BUY';
      const now = Math.floor(Date.now() / 1000);
      const seed = String(signal.symbol || 'ORION').split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      const start = buy ? entry * 0.992 : entry * 1.008;
      const end = buy ? (entry + target) / 2 : (entry + target) / 2;
      const candles = [];
      let prevClose = start;

      for (let i = 0; i < 64; i++) {
        const t = i / 63;
        const drift = start + (end - start) * t;
        const wave = Math.sin((i + seed) / 3.2) * entry * 0.0009 + Math.cos((i + seed) / 5.5) * entry * 0.00045;
        const center = drift + wave;
        const open = prevClose;
        const close = center + Math.sin(i * 0.8) * entry * 0.00025;
        const high = Math.max(open, close) + entry * (0.00045 + (i % 3) * 0.00012);
        const low = Math.min(open, close) - entry * (0.00045 + ((i + 1) % 3) * 0.00012);
        candles.push({
          time: now - (63 - i) * 300,
          open: Number(open.toFixed(5)),
          high: Number(high.toFixed(5)),
          low: Number(low.toFixed(5)),
          close: Number(close.toFixed(5))
        });
        prevClose = close;
      }
      return candles;
    }

    function buildEMA(candles, period) {
      if (!candles.length) return [];
      const k = 2 / (period + 1);
      let ema = candles[0].close;
      return candles.map((c) => {
        ema = c.close * k + ema * (1 - k);
        return { time: c.time, value: Number(ema.toFixed(5)) };
      });
    }

    function getChartApiInfo() {
      return {
        hasCreateChart: true,
        mode: 'tradingview-widget',
        note: 'Widget mode active'
      };
    }

    function App() {
      const [activePlan, setActivePlan] = useState('Platinum');
      const plan = plans[activePlan];
      const [selectedAsset, setSelectedAsset] = useState(plan.assets[0]);
      const [selectedType, setSelectedType] = useState(plan.entryTypes[0]);
      const [selectedRisk, setSelectedRisk] = useState(plan.riskModes[0]);
      const [search, setSearch] = useState('');
      const [liveRows, setLiveRows] = useState(fallbackLiveRows);
      const [feedStatus, setFeedStatus] = useState('Demo feed');
      const [lastUpdate, setLastUpdate] = useState('-');
      const [sourceUrl, setSourceUrl] = useState(parseRemoteSource());
      const [selectedSignalIdx, setSelectedSignalIdx] = useState(0);
      
      useEffect(() => {
        setSelectedAsset(plans[activePlan].assets[0]);
        setSelectedType(plans[activePlan].entryTypes[0]);
        setSelectedRisk(plans[activePlan].riskModes[0]);
      }, [activePlan]);

      useEffect(() => {
        let mounted = true;

        async function loadSignals() {
          try {
            const res = await fetch(`${sourceUrl}${sourceUrl.includes('?') ? '&' : '?'}t=${Date.now()}`, { cache: 'no-store' });
            if (!res.ok) throw new Error('bad response');
            const data = await res.json();
            const normalized = normalizeRows(data);
            if (!normalized.length) throw new Error('empty');
            if (mounted) {
              setLiveRows(normalized);
              setFeedStatus(sourceUrl.startsWith('http') ? 'Live online feed' : 'Live JSON feed');
              setLastUpdate(new Date().toLocaleTimeString());
              setSelectedSignalIdx((prev) => Math.min(prev, normalized.length - 1));
            }
          } catch {
            if (mounted) {
              setLiveRows(fallbackLiveRows);
              setFeedStatus('Demo feed');
              setLastUpdate(new Date().toLocaleTimeString());
              setSelectedSignalIdx(0);
            }
          }
        }

        loadSignals();
        const timer = setInterval(loadSignals, 5000);
        return () => {
          mounted = false;
          clearInterval(timer);
        };
      }, [sourceUrl]);

      const selectedLiveSignal = liveRows[selectedSignalIdx] || liveRows[0] || fallbackLiveRows[0];

      const exampleSignal = useMemo(() => {
        const assetMatch = liveRows.find((x) => x.symbol === selectedAsset);
        const basePlanSignal = signalByPlan[activePlan];

        if (assetMatch) {
          return {
            symbol: selectedAsset,
            type: selectedType,
            risk: selectedRisk,
            entry: assetMatch.entry || basePlanSignal.entry,
            sl: assetMatch.sl || basePlanSignal.sl,
            tp: assetMatch.tp || basePlanSignal.tp,
            direction: assetMatch.side || basePlanSignal.direction,
            confluence: assetMatch.setup || basePlanSignal.confluence,
            notes: basePlanSignal.notes,
            timeframe: assetMatch.tf || basePlanSignal.timeframe,
            confidence: `${assetMatch.score || 80} / 100`,
            quality: basePlanSignal.quality,
            ts: assetMatch.ts
          };
        }

        return {
          symbol: selectedAsset,
          type: selectedType,
          risk: selectedRisk,
          entry: basePlanSignal.entry,
          sl: basePlanSignal.sl,
          tp: basePlanSignal.tp,
          direction: basePlanSignal.direction,
          confluence: `${basePlanSignal.confluence} • preview for ${selectedAsset}`,
          notes: basePlanSignal.notes,
          timeframe: basePlanSignal.timeframe,
          confidence: basePlanSignal.confidence,
          quality: basePlanSignal.quality,
          ts: new Date().toISOString()
        };
      }, [activePlan, selectedAsset, selectedType, selectedRisk, liveRows]);

      const filteredWatch = watchRows.filter((x) => x.symbol.toLowerCase().includes(search.toLowerCase()));

      function handleAssetChange(nextAsset) {
        setSelectedAsset(nextAsset);
        const idx = liveRows.findIndex((x) => x.symbol === nextAsset);
        if (idx >= 0) {
          setSelectedSignalIdx(idx);
        }
      }

      function saveSource(e) {
        e.preventDefault();
        localStorage.setItem('orion_signals_source', sourceUrl);
        setFeedStatus('Reloading feed...');
        setLastUpdate('-');
      }

      function pickSignal(row, idx) {
        setSelectedSignalIdx(idx);
        setSelectedAsset(row.symbol);
      }

      return (
        <div className="min-h-screen bg-slate-950 text-white">
          <div className="mx-auto max-w-[1500px] px-6 py-8">
            <div className="mb-6 grid gap-6 xl:grid-cols-[260px_1fr]">
              <aside className="rounded-[28px] border border-white/10 bg-slate-900/80 p-5 shadow-2xl">
                <div className="mb-6 flex items-center gap-3">
                  <div className="rounded-2xl bg-cyan-400/15 p-3 text-cyan-300">📈</div>
                  <div>
                    <div className="text-lg font-bold">ORION RADAR</div>
                    <div className="text-xs text-slate-400">Local dashboard over IP</div>
                  </div>
                </div>

                <div className="space-y-2">
                  {Object.keys(plans).map((planName) => (
                    <button
                      key={planName}
                      onClick={() => setActivePlan(planName)}
                      className={`flex w-full items-center justify-between rounded-2xl px-4 py-3 text-sm font-semibold transition ${activePlan === planName ? 'bg-cyan-400 text-slate-950' : 'bg-white/5 text-slate-200 hover:bg-white/10'}`}
                    >
                      <span>{planName}</span>
                      <span>{planName === 'Platinum' ? '👑' : ''}</span>
                    </button>
                  ))}
                </div>

                <div className="mt-6 rounded-2xl border border-white/10 bg-black/20 p-4">
                  <div className="mb-2 text-xs uppercase tracking-wide text-slate-400">Plan Summary</div>
                  <div className={`text-lg font-bold ${plan.accent}`}>{plan.name}</div>
                  <div className="text-3xl font-bold">{plan.price}</div>
                  <div className="mt-2 text-sm text-slate-400">{plan.signalsPerDay}</div>
                  <div className="text-sm text-slate-400">{plan.delay}</div>
                </div>
              </aside>

              <main className="space-y-6">
                <section className={`rounded-[28px] border border-white/10 bg-gradient-to-br ${plan.color} p-6 shadow-xl`}>
                  <div className="flex flex-col gap-5 lg:flex-row lg:items-start lg:justify-between">
                    <div>
                      <div className="mb-2 inline-flex rounded-full border border-white/10 bg-white/10 px-3 py-1 text-xs text-slate-200">{plan.badge}</div>

                      <p className="mt-3 max-w-3xl text-slate-300">Version with online signals feed and real TradingView chart access. Bronze, Silver, and Gold use a basic TradingView experience, while Platinum gets the premium Orion presentation.</p>
                    </div>
                    <div className="grid gap-3 sm:grid-cols-3">
                      <MetricCard label="Signal Confidence" value={exampleSignal.confidence} />
                      <MetricCard label="Execution Quality" value={exampleSignal.quality} />
                      <MetricCard label="Feed Status" value={feedStatus} />
                    </div>
                  </div>
                </section>

                <section className="rounded-[28px] border border-white/10 bg-slate-900/70 p-6 shadow-xl">

                </section>

                <section className="grid gap-6 xl:grid-cols-[1.1fr_0.9fr]">

                    <div className="grid gap-4 lg:grid-cols-4">

                      </ControlCard>
                      <ControlCard label="Asset">
                        <select value={selectedAsset} onChange={(e) => handleAssetChange(e.target.value)} className="min-h-[56px] w-full min-w-[140px] rounded-2xl border border-white/10 bg-black/30 px-3 py-3 text-sm text-white outline-none">
                          {plan.assets.map((item) => <option key={item}>{item}</option>)}
                        </select>
                      </ControlCard>
                      <ControlCard label="Risk Mode">
                        <select value={selectedRisk} onChange={(e) => setSelectedRisk(e.target.value)} className="min-h-[56px] w-full min-w-[140px] rounded-2xl border border-white/10 bg-black/30 px-3 py-3 text-sm text-white outline-none">
                          {plan.riskModes.map((item) => <option key={item}>{item}</option>)}
                        </select>
                      </ControlCard>
                      <ControlCard label="Chart Access">
                        <div className="flex min-h-[56px] items-center gap-2 rounded-2xl border border-white/10 bg-black/20 px-4 py-3 text-sm text-slate-300">
                          <span>📊</span><span>{activePlan === 'Platinum' ? 'Premium TradingView access' : 'Basic TradingView access'}</span>
                        </div>
                      </ControlCard>
                    </div>

                    <div className="mt-6 grid gap-4 md:grid-cols-2">
                      <FeatureBox title="Included in this plan" items={plan.features} tone="emerald" />
                      <FeatureBox title="Locked / upgrade required" items={plan.locked} tone="rose" locked />
                    </div>
                  </div>

                  <div className="rounded-[28px] border border-white/10 bg-slate-900/70 p-6 shadow-xl">
                    <div className="mb-5 flex items-center justify-between">
                      <div>
                        <h2 className="text-2xl font-bold">Trade Setup</h2>
                        <p className="text-sm text-slate-400">Execution preview for the selected signal</p>
                      </div>
                      <div className={`rounded-full px-3 py-1 text-xs font-semibold ${exampleSignal.direction === 'BUY' ? 'bg-emerald-400/10 text-emerald-300' : 'bg-rose-400/10 text-rose-300'}`}>{exampleSignal.direction}</div>
                    </div>

                    <div className="grid gap-3 sm:grid-cols-2">
                      <InfoRow label="Asset" value={exampleSignal.symbol} />
                      <InfoRow label="Timeframe" value={exampleSignal.timeframe} />
                      <InfoRow label="Entry Type" value={exampleSignal.type} />
                      <InfoRow label="Risk Mode" value={exampleSignal.risk} />
                    </div>

                    <div className="mt-4 grid grid-cols-3 gap-3">
                      <SignalStat label="Entry" value={exampleSignal.entry} />
                      <SignalStat label="Stop" value={exampleSignal.sl} />
                      <SignalStat label="Target" value={exampleSignal.tp} />
                    </div>

                    <div className="mt-4 rounded-2xl border border-white/10 bg-black/20 p-4">
                      <div className="mb-2 text-sm font-semibold text-cyan-300">Confluence</div>
                      <div className="text-slate-300">{exampleSignal.confluence}</div>
                    </div>

                    <div className="mt-4 rounded-2xl border border-white/10 bg-black/20 p-4">
                      <div className="mb-2 text-sm font-semibold text-slate-200">Timestamp</div>
                      <div className="text-slate-400">{exampleSignal.ts || '-'}</div>
                    </div>
                  </div>
                </section>

                <section className="rounded-[28px] border border-white/10 bg-slate-900/70 p-4 shadow-xl">
                  <div className="mb-4 flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-white/10 bg-slate-950/80 px-4 py-3 text-sm text-slate-300">
                    <div className="flex items-center gap-2">
                      <span className="rounded bg-white/10 px-2 py-1">Market</span>
                      <span className="rounded bg-white/10 px-2 py-1">Chart</span>
                      <span className="rounded bg-white/10 px-2 py-1">Signals</span>
                      <span className="rounded bg-white/10 px-2 py-1">Orders</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="rounded bg-cyan-400/20 px-2 py-1 text-cyan-300">{exampleSignal.symbol}</span>
                      <span className="rounded bg-white/10 px-2 py-1">{exampleSignal.timeframe}</span>
                      <span className="rounded bg-emerald-400/10 px-2 py-1 text-emerald-300">selected: {selectedAsset}</span>
                    </div>
                  </div>

                  <div className="grid gap-4 xl:grid-cols-[270px_1fr_320px]">
                    <div className="rounded-2xl border border-white/10 bg-slate-950/70 p-4">
                      <div className="mb-3 flex items-center justify-between">
                        <div className="text-sm font-semibold text-slate-200">Market Watch</div>
                        <div className="rounded-lg bg-white/5 p-2">🔎</div>
                      </div>
                      <div className="mb-3 rounded-2xl border border-white/10 bg-black/20 px-3 py-2">
                        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search symbol" className="w-full bg-transparent text-sm outline-none placeholder:text-slate-500" />
                      </div>
                      <div className="grid grid-cols-[1fr_auto_auto_auto] gap-2 border-b border-white/10 pb-2 text-[11px] uppercase tracking-wide text-slate-500">
                        <span>Symbol</span><span>Bid</span><span>Ask</span><span>Spr</span>
                      </div>
                      <div className="mt-2 space-y-1">
                        {filteredWatch.map((item) => (
                          <button
                            key={item.symbol}
                            onClick={() => handleAssetChange(item.symbol)}
                            className={`grid w-full grid-cols-[1fr_auto_auto_auto] gap-2 rounded-xl px-2 py-2 text-left text-sm ${item.symbol === exampleSignal.symbol ? 'bg-cyan-400/10 text-cyan-200' : 'bg-white/5 text-slate-300'}`}
                          >
                            <span>{item.symbol}</span><span>{item.bid}</span><span>{item.ask}</span><span>{item.spread}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="rounded-2xl border border-white/10 bg-black p-3">
                      <div className="mb-3 flex items-center justify-between text-xs text-slate-400">
                        <div>{exampleSignal.symbol}, {exampleSignal.timeframe}</div>
                        <div className="flex gap-2">
                          <span className="rounded bg-white/10 px-2 py-1">Live Signal Overlay</span>
                          <span className="rounded bg-white/10 px-2 py-1">Entry / Stop / Target</span>
                        </div>
                      </div>
                      <div className="relative overflow-hidden rounded-xl border border-white/10 bg-slate-950 h-[460px]">
                        <TradingViewChart signal={exampleSignal} planName={activePlan} />
                      </div>
                    </div>

                    <div className="rounded-2xl border border-white/10 bg-slate-950/70 p-4">
                      <div className="mb-3 text-sm font-semibold text-slate-200">Signal Panel</div>
                      <div className="space-y-3 text-sm">
                        <PanelBox title="Selected Signal">
                          <div className="space-y-1 text-slate-300">
                            <div>Type: {exampleSignal.direction}</div>
                            <div>Asset: {exampleSignal.symbol}</div>
                            <div>Entry: {exampleSignal.entry}</div>
                            <div>Stop: {exampleSignal.sl}</div>
                            <div>Target: {exampleSignal.tp}</div>
                          </div>
                        </PanelBox>
                        <PanelBox title="Confluence">{exampleSignal.confluence}</PanelBox>
                        <PanelBox title="Plan Status">{plan.name} — {plan.signalsPerDay}</PanelBox>
                        <PanelBox title="Access Layer">{plan.delay}</PanelBox>
                      </div>
                    </div>
                  </div>
                </section>

                <section className="rounded-[28px] border border-white/10 bg-slate-900/70 p-6 shadow-xl">
                  <div className="mb-4 flex items-center justify-between">
                    <h2 className="text-2xl font-bold">Live Signals</h2>
                    <div className="rounded-full bg-emerald-400/10 px-3 py-1 text-xs text-emerald-300">{feedStatus}</div>
                  </div>
                  <div className="space-y-3">
                    {liveRows.map((row, i) => (
                      <button key={`${row.symbol}-${row.tf}-${i}`} onClick={() => pickSignal(row, i)} className={`w-full rounded-2xl border p-4 text-left ${i === selectedSignalIdx ? 'border-cyan-400/40 bg-cyan-400/10' : 'border-white/10 bg-black/20'}`}>
                        <div className="flex items-center justify-between">
                          <div>
                            <div className="font-semibold">{row.symbol} • {row.tf}</div>
                            <div className="text-sm text-slate-400">{row.setup}</div>
                          </div>
                          <div className={`${row.side === 'BUY' ? 'text-emerald-400' : 'text-rose-400'} font-bold`}>{row.side}</div>
                        </div>
                        <div className="mt-3 flex items-center justify-between">
                          <span className="rounded-full bg-white/10 px-3 py-1 text-xs text-slate-300">{row.status}</span>
                          <span className="text-sm font-semibold text-cyan-300">Score {row.score}</span>
                        </div>
                      </button>
                    ))}
                  </div>
                </section>

                <section className="rounded-[28px] border border-white/10 bg-slate-900/70 p-6 shadow-xl">
                  <div className="mb-3 text-xl font-bold">TradingView Mode</div>
                  <div className="grid gap-3 md:grid-cols-2">
                    <PanelBox title="Basic plans">
                      Bronze, Silver, and Gold load the public TradingView Advanced Chart widget with a lighter configuration.
                    </PanelBox>
                    <PanelBox title="Platinum mode">
                      Platinum loads the premium Orion presentation around the TradingView chart. Full private TradingView library integration can be added later.
                    </PanelBox>
                  </div>
                </section>
              </main>
            </div>
          </div>
        </div>
      );
    }

    function TradingViewChart({ signal, planName }) {
      const containerRef = useRef(null);
      const basicPlan = planName !== 'Platinum';

      useEffect(() => {
        const root = containerRef.current;
        if (!root) return;
        root.innerHTML = '';

        const shell = document.createElement('div');
        shell.className = 'tradingview-widget-container h-full w-full';

        const widgetDiv = document.createElement('div');
        widgetDiv.className = 'tradingview-widget-container__widget h-full w-full';

        const copyright = document.createElement('div');
        copyright.className = 'tradingview-widget-copyright';
        copyright.innerHTML = '<span class="text-xs text-slate-500">TradingView chart</span>';

        const script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
        script.async = true;

        const symbolMap = {
          EURUSD: 'FX:EURUSD',
          GBPUSD: 'FX:GBPUSD',
          USDJPY: 'FX:USDJPY',
          XAUUSD: 'OANDA:XAUUSD',
          BTCUSD: 'BITSTAMP:BTCUSD',
          ETHUSD: 'BITSTAMP:ETHUSD',
          US100: 'OANDA:NAS100USD',
          US500: 'OANDA:SPX500USD'
        };

        const intervalMap = {
          M5: '5',
          M15: '15',
          M30: '30',
          H1: '60'
        };

        const chartSymbol = symbolMap[signal.symbol] || signal.symbol || 'FX:EURUSD';
        const interval = intervalMap[signal.timeframe] || '5';

        const config = {
          autosize: true,
          symbol: chartSymbol,
          interval,
          timezone: 'Etc/UTC',
          theme: 'dark',
          style: '1',
          locale: 'en',
          enable_publishing: false,
          allow_symbol_change: false,
          hide_top_toolbar: basicPlan,
          hide_legend: false,
          save_image: !basicPlan,
          calendar: false,
          support_host: 'https://www.tradingview.com',
          studies: basicPlan ? [] : ['MASimple@tv-basicstudies', 'Volume@tv-basicstudies']
        };

        script.innerHTML = JSON.stringify(config);

        shell.appendChild(widgetDiv);
        shell.appendChild(copyright);
        shell.appendChild(script);
        root.appendChild(shell);

        return () => {
          root.innerHTML = '';
        };
      }, [signal.symbol, signal.timeframe, planName]);

      return (
        <div className="relative h-full w-full overflow-hidden rounded-xl bg-[#07111f]">
          <div ref={containerRef} className="h-full w-full" />
          <div className="pointer-events-none absolute left-3 top-2 rounded-md border border-white/10 bg-[#0b1220]/95 px-3 py-1.5 text-[12px] text-slate-200">
            {signal.symbol}, {signal.timeframe}
          </div>
          <div className="pointer-events-none absolute right-3 top-2 rounded-md border border-white/10 bg-[#0b1220]/95 px-3 py-1.5 text-[11px] text-slate-300">
            {planName === 'Platinum' ? 'ORION RADAR PRO' : 'TRADINGVIEW BASIC'}
          </div>
          {!basicPlan && (
            <div className="pointer-events-none absolute left-3 bottom-3 rounded-md border border-cyan-400/20 bg-cyan-400/10 px-3 py-2 text-[11px] text-cyan-300">
              Platinum mode • premium Orion presentation
            </div>
          )}
        </div>
      );
    }

    function MetricCard({ label, value }) {
      return <div className="rounded-2xl border border-white/10 bg-black/20 px-4 py-4"><div className="text-xs uppercase tracking-wide text-slate-400">{label}</div><div className="mt-2 text-lg font-bold text-white break-words">{value}</div></div>;
    }
    function ControlCard({ label, children }) {
      return <div><label className="mb-2 block text-sm text-slate-400">{label}</label>{children}</div>;
    }
    function FeatureBox({ title, items, tone, locked = false }) {
      const toneClasses = tone === 'emerald' ? 'border-emerald-500/20 bg-emerald-500/10 text-emerald-300' : 'border-rose-500/20 bg-rose-500/10 text-rose-300';
      return <div className={`rounded-2xl border p-4 ${toneClasses}`}><div className="mb-2 text-sm font-semibold">{title}</div><div className="space-y-2 text-sm text-slate-200">{items.length ? items.map((item) => <div key={item} className="flex items-start gap-2">{locked ? <span>🔒</span> : <span>•</span>}<span>{item}</span></div>) : <div>No restrictions in this plan.</div>}</div></div>;
    }
    function InfoRow({ label, value }) {
      return <div className="rounded-2xl border border-white/10 bg-black/20 px-4 py-3"><div className="text-xs uppercase tracking-wide text-slate-500">{label}</div><div className="mt-1 font-semibold text-white">{value}</div></div>;
    }
    function PanelBox({ title, children }) {
      return <div className="rounded-xl border border-white/10 bg-white/5 p-3"><div className="mb-2 text-xs uppercase tracking-wide text-slate-400">{title}</div><pre className="whitespace-pre-wrap break-words text-slate-300">{children}</pre></div>;
    }
    function SignalStat({ label, value }) {
      return <div className="rounded-2xl border border-white/10 bg-black/20 p-4 text-center"><div className="text-xs uppercase tracking-wide text-slate-400">{label}</div><div className="mt-1 text-lg font-bold">{value}</div></div>;
    }

    window.__ORION_TESTS__ = {
      normalizeRows_basic() {
        const row = normalizeRows({ signals: [{ symbol: 'TEST', tf: 'M5', side: 'buy', entry: 1.1, sl: 1.0, tp: 1.2 }] })[0];
        return row.symbol === 'TEST' && row.side === 'BUY' && row.tf === 'M5';
      },
      chartApi_detect() {
        const info = getChartApiInfo();
        return typeof info.hasCreateChart === 'boolean';
      },
      syntheticCandles_nonempty() {
        return buildSyntheticCandles({ symbol: 'EURUSD', entry: '1.1', sl: '1.0', tp: '1.2', direction: 'BUY' }).length === 64;
      }
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
